services:
  processamento-estatistico:
    build:
      context: .
      dockerfile: Dockerfile
      # Necessário para build em Mac Apple Silicon (arm64) gerando imagem para servidor amd64
      platforms:
        - linux/amd64
    platform: linux/amd64
    container_name: expertise-processamento
    ports:
      - "8501:8501"
    volumes:
      - ./App:/app/App
      - ./App/.streamlit/secrets.toml:/app/App/.streamlit/secrets.toml:ro
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
